<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ByeBuy</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --blush:        #f5eeee;
      --petal:        #edddd4;
      --dusty:        #d4b8b8;
      --accent:       #9e7070;
      --accent-light: #c49a9a;
      --accent-dark:  #6b4a4a;
      --text-primary:   #3d2b2b;
      --text-secondary: #8a6a6a;
      --text-light:     #b89898;
      --card-bg:     #fdfaf9;
      --card-border: #edddd4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      width: 280px;
      padding: 14px;
      background-color: var(--blush);
      background-image: radial-gradient(circle, #d4b8b8 1px, transparent 1px);
      background-size: 22px 22px;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ──────────────────────────────────────────────────────── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .header h2 {
      font-family: 'Lora', serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      font-style: italic;
    }

    /* ── Cards ───────────────────────────────────────────────────────── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 11px 13px;
      margin-bottom: 8px;
      box-shadow: 0 2px 12px rgba(158,112,112,0.07);
    }

    .card-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-light);
      margin-bottom: 7px;
    }

    /* ── Buttons ─────────────────────────────────────────────────────── */
    button { font-family: 'DM Sans', sans-serif; cursor: pointer; }

    .btn-primary {
      width: 100%;
      padding: 9px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      color: white;
      border: none;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 3px 10px rgba(158,112,112,0.22);
      transition: opacity 0.2s;
      margin-top: 4px;
    }

    .btn-primary:hover { opacity: 0.9; }

    .btn-soft {
      width: 100%;
      padding: 8px;
      background: var(--petal);
      color: var(--accent-dark);
      border: 1px solid var(--dusty);
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
      margin-top: 6px;
      transition: background 0.2s;
    }

    .btn-soft:hover { background: var(--dusty); }

    .btn-logout {
      font-size: 10px;
      padding: 3px 10px;
      background: var(--petal);
      color: var(--accent-dark);
      border: 1px solid var(--dusty);
      border-radius: 100px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-logout:hover { background: var(--dusty); }

    /* ── Inputs ──────────────────────────────────────────────────────── */
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 8px 11px;
      margin-bottom: 8px;
      border: 1px solid var(--dusty);
      border-radius: 10px;
      background: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="email"]:focus,
    input[type="password"]:focus { border-color: var(--accent-light); }

    input[type="number"] {
      width: 60px;
      margin-left: 6px;
      padding: 4px 8px;
      border: 1px solid var(--dusty);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text-primary);
      background: white;
      outline: none;
    }

    /* ── User badge ──────────────────────────────────────────────────── */
    .user-badge {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 7px 11px;
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 8px;
    }

    /* ── Last cart ───────────────────────────────────────────────────── */
    #last {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* ── Disable dropdown ────────────────────────────────────────────── */
    .disable-wrapper { position: relative; }

    #disableMenu {
      position: absolute;
      bottom: calc(100% + 4px);
      left: 0; right: 0;
      background: white;
      border: 1px solid var(--card-border);
      border-radius: 12px;
      overflow: hidden;
      z-index: 10;
      box-shadow: 0 4px 16px rgba(158,112,112,0.12);
    }

    #disableMenu.hidden { display: none; }

    .disable-option {
      display: block;
      width: 100%;
      margin: 0;
      padding: 9px 14px;
      text-align: left;
      background: none;
      border: none;
      border-bottom: 1px solid var(--card-border);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.15s;
    }

    .disable-option:last-child { border-bottom: none; color: #b06060; }
    .disable-option:hover { background: var(--blush); }

    /* ── Status / error ──────────────────────────────────────────────── */
    #result {
      font-size: 11px;
      color: var(--text-light);
      text-align: center;
      margin-top: 8px;
    }

    .error-msg {
      color: #b06060;
      font-size: 11px;
      margin-bottom: 6px;
      display: none;
    }

    .hidden { display: none !important; }
  </style>
</head>

<body>

  <div class="header">
    <h2>ByeBuy</h2>
  </div>

  <!-- ── LOGIN VIEW ──────────────────────────────────────────────────── -->
  <div id="login-view" class="card" style="display:none;">
    <p class="card-label">Sign in to track purchases</p>
    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />
    <p id="login-error" class="error-msg"></p>
    <button class="btn-primary" id="loginBtn">Log In</button>
    <p style="font-size:11px; color:var(--text-light); text-align:center; margin-top:8px;">
      Same account as the web app
    </p>
  </div>

  <!-- ── MAIN VIEW ───────────────────────────────────────────────────── -->
  <div id="main-view" style="display:none;">

    <div class="user-badge">
      <span id="userName-display">👋 User</span>
      <button class="btn-logout" id="logoutBtn">Log out</button>
    </div>

    <!-- Hourly wage -->
    <div class="card">
      <p class="card-label">Hourly Wage</p>
      <label style="font-size:13px; color:var(--text-secondary);">
        $<input id="wage" type="number" min="1" step="1" value="20" />
        <span style="font-size:11px; color:var(--text-light); margin-left:4px;">per hour</span>
      </label>
    </div>

    <!-- Last item -->
    <div class="card">
      <p class="card-label">Last Detected Item</p>
      <div id="last" style="color:var(--text-light); font-size:12px;">No purchase detected yet.</div>
    </div>

    <!-- Actions -->
    <div class="card">
      <p class="card-label">Actions</p>
      <button class="btn-soft" id="wait">View Dashboard</button>
      <button class="btn-soft" id="resume">Resume Purchase</button>

      <div class="disable-wrapper" style="margin-top:6px;">
        <button class="btn-soft" id="disableBtn" style="margin-top:0;">Disable Extension ▾</button>
        <div id="disableMenu" class="hidden">
          <button class="disable-option" data-hours="1">Disable for 1 hour</button>
          <button class="disable-option" data-hours="4">Disable for 4 hours</button>
          <button class="disable-option" data-hours="8">Disable for 8 hours</button>
          <button class="disable-option" data-hours="0">Disable permanently</button>
        </div>
      </div>

      <div id="result"></div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
